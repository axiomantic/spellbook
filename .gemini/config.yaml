# Gemini Code Assist app config — exclude large generated lockfiles from review diffs.
have_fun: false
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  pull_request_opened:
    summary: true
    code_review: true
ignore_patterns:
  - "package-lock.json"
  # Masks the bundle-deletion hunks in transition PRs and any stray build artifacts.
  - "spellbook/admin/static/**"
  - "**/.build-hash"
