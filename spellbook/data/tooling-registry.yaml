        trust_tier: 1
        source: "https://cli.github.com"
        description: "Official GitHub CLI"
        dep_signals: {}
        cli_names: ["gh"]

      - name: "GitHub MCP Server"
        type: mcp_server
        trust_tier: 1
        source: "https://github.com/github/github-mcp-server"
        description: "Official GitHub MCP integration"
        mcp_tool_prefix: "mcp__github__"
        dep_signals:
          npm: ["@github/mcp-server"]
        cli_names: []

