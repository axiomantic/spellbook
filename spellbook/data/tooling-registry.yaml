# Tooling Discovery Registry
# Maps technology domains to known tools with trust classification.
#
# Trust Tiers:
#   1: First-party official (vendor-maintained, well-known)
#   2: Established ecosystem (widely adopted, community-vetted)
#   3: Community standard (popular, active maintenance)
#   4: Niche/specialized (smaller audience, less vetting)
#   5: Experimental (new, unproven, but promising)
#   6: Unknown provenance (no vetting, use at own risk)

version: 1

domains:
  jira:
    keywords: ["jira", "atlassian", "issue-tracking"]
    tools:
      - name: "Atlassian MCP Server"
        type: mcp_server
        trust_tier: 1
        source: "https://github.com/atlassian/mcp-server"
        description: "Official Atlassian MCP server for Jira, Confluence"
        mcp_tool_prefix: "mcp__atlassian__"
        dep_signals:
          npm: ["@atlassian/mcp-server"]
        cli_names: []

      - name: "jira-cli"
        type: cli
        trust_tier: 2
        source: "https://github.com/ankitpokhrel/jira-cli"
        description: "Interactive Jira CLI"
        dep_signals: {}
        cli_names: ["jira"]

  linear:
    keywords: ["linear", "issue-tracking", "project-management"]
    tools:
      - name: "Linear MCP Server"
        type: mcp_server
        trust_tier: 1
        source: "https://github.com/linear/linear-mcp-server"
        description: "Official Linear MCP integration"
        mcp_tool_prefix: "mcp__linear__"
        dep_signals: {}
        cli_names: []

  asana:
    keywords: ["asana", "project-management", "task-management"]
    tools:
      - name: "Asana API"
        type: api
        trust_tier: 1
        source: "https://developers.asana.com"
        description: "Official Asana REST API"
        dep_signals:
          pypi: ["asana"]
          npm: ["asana"]
        cli_names: []

  github:
