[alembic]
script_location = .
sqlalchemy.url = sqlite:///placeholder
# Per-DB version directories. Alembic's ScriptDirectory is built before
# env.py executes, so version_locations cannot be configured dynamically
# from env.py - it must live in the .ini. Each DB's revisions are under
# versions/<db_name>/ and use distinct revision ids so cross-DB scanning
# is safe. env.py's -x db=<name> CLI arg still selects which DB engine
# receives the migrations at run time.
version_path_separator = space
version_locations = %(here)s/versions/spellbook %(here)s/versions/fractal %(here)s/versions/forged %(here)s/versions/coordination

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
